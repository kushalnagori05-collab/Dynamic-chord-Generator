var NOTES=["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
var NOTES_FLAT=["C","Db","D","Eb","E","F","Gb","G","Ab","A","Bb","B"];

function parseChord(s){var m=s.match(/^([A-G][b#]?)(.*)$/);if(!m)return{root:s,suffix:""};return{root:m[1],suffix:m[2]}}
function noteIdx(n){var i=NOTES.indexOf(n);if(i===-1)i=NOTES_FLAT.indexOf(n);return i}
function transposeChord(s,steps){var p=parseChord(s);var i=noteIdx(p.root);if(i===-1)return s;return NOTES[((i+steps)%12+12)%12]+p.suffix}
function getScaleNotes(key){var p=parseChord(key);var i=noteIdx(p.root);if(i===-1)return[];var iv=p.suffix.indexOf('m')!==-1?[0,2,3,5,7,8,10]:[0,2,4,5,7,9,11];return iv.map(function(x){return NOTES[(i+x)%12]})}

var PIANO_IV={"": [0,4,7],"m":[0,3,7],"7":[0,4,7,10],"m7":[0,3,7,10],"maj7":[0,4,7,11],"dim":[0,3,6],"aug":[0,4,8],"sus4":[0,5,7],"sus2":[0,2,7],"add9":[0,4,7,14],"7sus4":[0,5,7,10]};
function getPianoKeys(s){var p=parseChord(s);var i=noteIdx(p.root);if(i===-1)return[];var iv=PIANO_IV[p.suffix]||PIANO_IV[""];return iv.map(function(x){return(i+x)%12})}
function getChordNotes(s){var p=parseChord(s);var i=noteIdx(p.root);if(i===-1)return[];var iv=PIANO_IV[p.suffix]||PIANO_IV[""];return iv.map(function(x){return NOTES[(i+x)%12]})}

// Generate barre chord for any chord not hardcoded
function getGuitarShape(name){
  if(GC[name])return GC[name];
  var p=parseChord(name);var ri=noteIdx(p.root);if(ri===-1)return null;
  // E-shape barre (root on 6th string)
  var ef=(ri-4+12)%12; // E=0
  // A-shape barre (root on 5th string)
  var af=(ri-9+12)%12; // A=0
  var suf=p.suffix;
  // For frets > 0 on either shape, pick the lower one
  var useE = ef>0 && (ef<=af||af===0);
  if(useE){
    var f=ef;
    if(suf==='m')return[f,f+2,f+2,f,f,f];
    if(suf==='7')return[f,f+2,f,f+1,f,f];
    if(suf==='m7')return[f,f+2,f,f,f,f];
    if(suf==='maj7')return[f,f+2,f+1,f+1,f,f];
    if(suf==='dim')return[f,-1,f+1,f,f+1,-1];
    if(suf==='aug')return[f,f+3,f+2,f+1,f+1,f];
    if(suf==='sus4')return[f,f+2,f+2,f+2,f,f];
    if(suf==='sus2')return[f,f+2,f+2,f-1>0?f-1:-1,f,f];
    return[f,f+2,f+2,f+1,f,f]; // major
  } else {
    var f=af;if(f===0)f=12; // avoid open if not hardcoded
    if(suf==='m')return[-1,f,f+2,f+2,f+1,f];
    if(suf==='7')return[-1,f,f+2,f,f+2,f];
    if(suf==='m7')return[-1,f,f+2,f,f+1,f];
    if(suf==='maj7')return[-1,f,f+2,f+1,f+2,f];
    if(suf==='dim')return[-1,f,f+1,-1,f+1,f];
    if(suf==='aug')return[-1,f,f+3,f+2,f+2,f];
    if(suf==='sus4')return[-1,f,f+2,f+2,f+3,f];
    if(suf==='sus2')return[-1,f,f+2,f+2,f,f];
    return[-1,f,f+2,f+2,f+2,f]; // major
  }
}

/* ======= GUITAR CHORD SVG ======= */
const GuitarSVG=({name,size})=>{
  const shape=getGuitarShape(name);
  if(!shape)return <div style={{fontSize:'0.65rem',color:'var(--tx2)'}}>—</div>;
  const fretted=shape.filter(f=>f>0);
  const minF=fretted.length?Math.min(...fretted):1;
  const maxF=fretted.length?Math.max(...fretted):1;
  const open=minF<=3&&maxF<=4;
  const start=open?1:minF;
  const sc=size==='sm'?0.7:1;
  const L=12,T=24,SS=10,FS=18,NF=4;
  return(
    <svg width={70*sc} height={110*sc} viewBox={`0 0 70 110`} style={{display:'block',margin:'0 auto'}}>
      {open&&<rect x={L} y={T} width={SS*5} height={3} fill="#eef0f6" rx="1"/>}
      {!open&&<text x={L-3} y={T+FS-2} fill="#8890a4" fontSize="9" fontWeight="bold" textAnchor="end">{start}fr</text>}
      {[0,1,2,3,4].map(i=><line key={i} x1={L} y1={T+i*FS} x2={L+SS*5} y2={T+i*FS} stroke="#444" strokeWidth="1"/>)}
      {[0,1,2,3,4,5].map(i=><line key={i} x1={L+i*SS} y1={T} x2={L+i*SS} y2={T+NF*FS} stroke="#999" strokeWidth={1.4-i*0.1}/>)}
      {shape.map((f,si)=>{
        const x=L+si*SS;
        if(f===-1)return <text key={si} x={x} y={T-5} fill="#ef4444" fontSize="9" fontWeight="bold" textAnchor="middle">✕</text>;
        if(f===0)return <circle key={si} cx={x} cy={T-8} r="3" fill="none" stroke="#22c55e" strokeWidth="1.5"/>;
        const df=f-start+1;
        return <circle key={si} cx={x} cy={T+(df-1)*FS+FS/2} r="4" fill="#00e5ff"/>;
      })}
      {/* Barre bar */}
      {(()=>{if(fretted.length<2)return null;const bf=minF;const bs=[];shape.forEach((f,i)=>{if(f===bf)bs.push(i)});if(bs.length>=2){const fi=Math.min(...bs),la=Math.max(...bs);if(la-fi>=2){const df=bf-start+1;const y=T+(df-1)*FS+FS/2;return<rect x={L+fi*SS-3} y={y-3.5} width={(la-fi)*SS+6} height={7} rx="3.5" fill="#00e5ff" opacity="0.6"/>}}return null})()}
    </svg>
  );
};

      {BK.map(({n,a})=><rect key={n} x={(a+1)*KW-BW/2} y={0} width={BW} height={BH} fill={hi.includes(n)?"#00e5ff":"#1a1e28"} stroke="#111" strokeWidth="0.5" rx="1"/>)}

/* ======= METRONOME SOUND ENGINE ======= */
function useMetronome(){
  const[bpm,setBpm]=useState(120);
  const[playing,setPlaying]=useState(false);
  const[beat,setBeat]=useState(-1);
  const[angle,setAngle]=useState(0);
  const timer=useRef(null);
  const ctx=useRef(null);
  const cnt=useRef(0);

  const click=useCallback((accent)=>{
    if(!ctx.current)ctx.current=new(window.AudioContext||window.webkitAudioContext)();
    const c=ctx.current,now=c.currentTime;
    if(c.state==='suspended')c.resume();
    // Woodblock noise burst
    const len=c.sampleRate*0.035;
    const buf=c.createBuffer(1,len,c.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,10);
    const src=c.createBufferSource();src.buffer=buf;
    const flt=c.createBiquadFilter();flt.type='bandpass';flt.frequency.value=accent?3800:2400;flt.Q.value=6;
    const gn=c.createGain();gn.gain.setValueAtTime(accent?0.8:0.45,now);gn.gain.exponentialRampToValueAtTime(0.001,now+0.05);
    src.connect(flt);flt.connect(gn);gn.connect(c.destination);src.start(now);src.stop(now+0.05);
    if(accent){const o=c.createOscillator(),og=c.createGain();o.type='triangle';o.frequency.setValueAtTime(2000,now);o.frequency.exponentialRampToValueAtTime(600,now+0.02);og.gain.setValueAtTime(0.2,now);og.gain.exponentialRampToValueAtTime(0.001,now+0.03);o.connect(og);og.connect(c.destination);o.start(now);o.stop(now+0.04)}
  },[]);

  useEffect(()=>{
    if(playing){
      cnt.current=0;
      const iv=(60/bpm)*1000;
      const tick=()=>{
        const acc=cnt.current%4===0;
        click(acc);setBeat(cnt.current%4);
        setAngle(cnt.current%2===0?30:-30);
        cnt.current++;
      };
      tick();
      timer.current=setInterval(tick,iv);
    }else{
      clearInterval(timer.current);setBeat(-1);setAngle(0);
    }
    return()=>clearInterval(timer.current);
  },[playing,bpm,click]);

  return{bpm,setBpm,playing,setPlaying,beat,angle};
}

const SongDetail=({song,metro})=>{
  const[tr,setTr]=useState(0);
  const[showScale,setShowScale]=useState(false);
  const[tab,setTab]=useState('guitar');

  const chords=song.chords.map(c=>transposeChord(c,tr));
  const key=transposeChord(song.key,tr);
  const scale=getScaleNotes(key);
  let capo=(song.guitar.capo+tr)%12;if(capo<0)capo+=12;

  const playScale=()=>{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    let oct=0,last=-1;
    scale.forEach((n,i)=>{
      let x=noteIdx(n);if(x<last)oct++;last=x;
      const f=261.63*Math.pow(2,(x+oct*12)/12);
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type='triangle';o.frequency.value=f;
      g.gain.setValueAtTime(0.15,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.8);
      o.connect(g);g.connect(ctx.destination);
      o.start(ctx.currentTime+i*0.25);
      o.stop(ctx.currentTime+i*0.25+0.8);
    });
    // Final octave note
    let fx=noteIdx(scale[0]);if(fx<last)oct++;
    const ff=261.63*Math.pow(2,(fx+oct*12)/12);
    const fo=ctx.createOscillator(),fg=ctx.createGain();
    fo.type='triangle';fo.frequency.value=ff;
    fg.gain.setValueAtTime(0.15,ctx.currentTime);
    fg.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+1.5);
    fo.connect(fg);fg.connect(ctx.destination);
    fo.start(ctx.currentTime+scale.length*0.25);
    fo.stop(ctx.currentTime+scale.length*0.25+1.5);
  };

  return(
    <div className="detail">
      <div className="back-btn" onClick={()=>go('#/songs')}>{Ico.back} Back to Songs</div>

      <div className="detail-hdr">
        <div style={{flex:1}}>

          <div style={{display:'flex',flexWrap:'wrap',gap:'0.4rem'}}>
            <span className="badge badge-ac" onClick={()=>setShowScale(!showScale)}>🎵 Key: {key} {showScale?'▲':'▼'}</span>

              {Ico.play} {song.bpm} BPM

          </div>
          {showScale&&(
            <div className="scale-box">
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'0.5rem'}}>
                <div style={{fontSize:'0.8rem',color:'var(--tx2)'}}>{key} Scale</div>
                <button className="btn btn-ghost" onClick={playScale} style={{padding:'0.2rem 0.8rem',fontSize:'0.75rem'}}>🔊 Play Scale</button>
              </div>
              <div className="scale-notes">{scale.map((n,i)=><span key={i} className="sn">{n}</span>)}</div>
            </div>
          )}
        </div>
        <div className="transpose">
          <button className="t-btn" onClick={()=>setTr(t=>t-1)}>−</button>
          <div className="t-val">{tr>0?'+'+tr:tr}</div>
          <button className="t-btn" onClick={()=>setTr(t=>t+1)}>+</button>
        </div>
      </div>

      {/* Guitar / Piano tabs */}

        <div className={`tab ${tab==='guitar'?'on':''}`} onClick={()=>setTab('guitar')}>🎸 Guitar</div>
        <div className={`tab ${tab==='piano'?'on':''}`} onClick={()=>setTab('piano')}>🎹 Piano</div>

const ChordModal=({name,onClose})=>{
  const notes=getChordNotes(name);
  const p=parseChord(name);
  const typeLabel=(CHORD_TYPES.find(t=>t.suffix===p.suffix)||{}).label||'Chord';
  const shape=getGuitarShape(name);

  // Play chord sound
  const playChord=()=>{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const keys=getPianoKeys(name);
    keys.forEach((semitone,i)=>{
      const freq=261.63*Math.pow(2,semitone/12); // Middle C octave
      const osc=ctx.createOscillator();
      const gn=ctx.createGain();
      osc.type='triangle';
      osc.frequency.value=freq;
      gn.gain.setValueAtTime(0.15,ctx.currentTime);
      gn.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+1.5);
      osc.connect(gn);gn.connect(ctx.destination);
      osc.start(ctx.currentTime+i*0.08);
      osc.stop(ctx.currentTime+1.5);
    });
  };

  return(
    <div className="chord-modal" onClick={onClose}>
      <div className="chord-modal-inner" onClick={e=>e.stopPropagation()}>
        <button className="modal-close" onClick={onClose}>{Ico.x}</button>

        <div style={{textAlign:'center',marginBottom:'1.5rem'}}>
          <div className="modal-name">{name}</div>
          <div className="modal-type">{typeLabel} Chord</div>
          <div className="modal-notes-row">
            {notes.map((n,i)=><span key={i} className="modal-note">{n}</span>)}
          </div>
          <button className="btn btn-fill" onClick={playChord} style={{marginTop:'1rem',fontSize:'0.8rem',padding:'0.5rem 1.5rem'}}>
            🔊 Play Chord
          </button>
        </div>

        <div className="modal-diagrams">
          <div className="modal-diagram">
            <div className="modal-diagram-label">🎸 Guitar Fingering</div>
            <GuitarSVG name={name}/>
            {shape&&(
              <div className="modal-frets">
                {shape.map((f,i)=><span key={i} style={{color:f===-1?'var(--rd)':f===0?'var(--gn)':'var(--tx)'}}>{f===-1?'X':f}</span>)}
              </div>
            )}
          </div>
          <div className="modal-diagram">
            <div className="modal-diagram-label">🎹 Piano Keys</div>
            <PianoSVG name={name}/>
            <div style={{marginTop:'0.5rem',fontSize:'0.7rem',color:'var(--tx2)'}}>
              Highlighted keys = notes to press
            </div>
          </div>
        </div>
      </div>
    </div>
  );
};

const LearnPage=()=>{
  const hash=useHash();
  const chordParam=hash.startsWith('#/learn/')?decodeURIComponent(hash.split('/')[2]):null;
  const[search,setSearch]=useState('');
  const[selectedRoot,setSelectedRoot]=useState(null);
  const[filter,setFilter]=useState('');
  const[modal,setModal]=useState(chordParam||null);
  const[instView,setInstView]=useState('guitar');

  useEffect(()=>{if(chordParam)setModal(chordParam)},[chordParam]);
  const closeModal=()=>{setModal(null);if(chordParam)go('#/learn')};

  // Build all chords
  const allChords=[];
  CHORD_TYPES.forEach(ct=>{
    ROOT_NOTES.forEach(r=>{
      allChords.push({name:r+ct.suffix,root:r,type:ct.suffix,typeLabel:ct.label});
    });
  });

  // Apply filters
  let shown=allChords;
  if(selectedRoot)shown=shown.filter(c=>c.root===selectedRoot);
  if(filter)shown=shown.filter(c=>c.type===filter);
  if(search.trim()){
    const q=search.trim().toLowerCase();
    shown=shown.filter(c=>c.name.toLowerCase().includes(q));
  }

  // Group by type for display
  const groups={};
  shown.forEach(c=>{
    if(!groups[c.type])groups[c.type]={label:c.typeLabel,chords:[]};
    groups[c.type].chords.push(c);
  });

  const toggleRoot=(r)=>setSelectedRoot(selectedRoot===r?null:r);

  return(
    <div className="page">
      <div className="container">
        <div className="sec-hd"><h2>Chord Library</h2></div>

        {/* Search + View toggle row */}
        <div className="learn-header">
          <div className="learn-search">
            {Ico.search}
            <input placeholder="Search chords... (e.g. Am7)" value={search} onChange={e=>setSearch(e.target.value)}/>
          </div>
          <div className="tabs" style={{marginBottom:0}}>
            <div className={`tab ${instView==='guitar'?'on':''}`} onClick={()=>setInstView('guitar')}>🎸 Guitar</div>
            <div className={`tab ${instView==='piano'?'on':''}`} onClick={()=>setInstView('piano')}>🎹 Piano</div>
            <div className={`tab ${instView==='both'?'on':''}`} onClick={()=>setInstView('both')}>Both</div>
          </div>
        </div>

        {/* Root note picker */}
        <div className="root-picker">
          <div style={{width:'100%',marginBottom:'0.3rem',fontSize:'0.7rem',color:'var(--tx2)',fontWeight:600,textTransform:'uppercase',letterSpacing:'1px'}}>Select Root Note</div>
          {ROOT_NOTES.map(r=>(
            <div key={r} className={`root-note ${selectedRoot===r?'on':''}`} onClick={()=>toggleRoot(r)}>{r}</div>
          ))}
          {selectedRoot&&<div style={{marginLeft:'auto',alignSelf:'center'}}><button style={{color:'var(--tx2)',fontSize:'0.8rem',textDecoration:'underline'}} onClick={()=>setSelectedRoot(null)}>Clear</button></div>}
        </div>

        {/* Type filter pills */}
        <div className="filter-bar">
          <button className={`filter-btn ${filter===''?'on':''}`} onClick={()=>setFilter('')}>All Types</button>
          {CHORD_TYPES.map(ct=>(
            <button key={ct.suffix} className={`filter-btn ${filter===ct.suffix?'on':''}`} onClick={()=>setFilter(ct.suffix)}>{ct.label}</button>
          ))}
        </div>

        {/* Grouped chord display */}
        {Object.keys(groups).length===0?(
          <div className="no-results">
            <h3>No chords found</h3>
            <p>Try adjusting your search or filters.</p>
          </div>
        ):(
          Object.entries(groups).map(([type,group])=>(
            <div className="chord-group" key={type}>
              <div className="chord-group-header">
                <h3>{group.label} Chords</h3>
                <div className="line"/>
                <div className="count">{group.chords.length}</div>
              </div>
              <div className="lib-grid">
                {group.chords.map(c=>{
                  const notes=getChordNotes(c.name);
                  return(
                    <div className="lib-card" key={c.name} onClick={()=>setModal(c.name)}>
                      <div className="cn">{c.name}</div>
                      <div className="type-tag">{c.typeLabel}</div>
                      <div className="notes">{notes.join(' – ')}</div>
                      <div className="diagram-wrap">
                        {(instView==='guitar'||instView==='both')&&<GuitarSVG name={c.name} size="sm"/>}
                        {(instView==='piano'||instView==='both')&&<PianoSVG name={c.name} size="sm"/>}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          ))
        )}
      </div>

      {modal&&<ChordModal name={modal} onClose={closeModal}/>}
    </div>
  );
};

            {root:'Eb',sig:'3 flats (Bb, Eb, Ab)',rh:'3-1-2-3-4-1-2-3',lh:'3-2-1-4-3-2-1-3'},
            {root:'Ab',sig:'4 flats (Bb, Eb, Ab, Db)',rh:'3-4-1-2-3-1-2-3',lh:'3-2-1-4-3-2-1-3'},
            {root:'Db',sig:'5 flats (Bb, Eb, Ab, Db, Gb)',rh:'2-3-1-2-3-4-1-2',lh:'3-2-1-4-3-2-1-3'},
          ];
          const minorInfo=[
            {root:'A',sig:'No sharps or flats (relative of C)',rh:'1-2-3-1-2-3-4-5',lh:'5-4-3-2-1-3-2-1'},
            {root:'E',sig:'1 sharp — F# (relative of G)',rh:'1-2-3-1-2-3-4-5',lh:'5-4-3-2-1-3-2-1'},
            {root:'B',sig:'2 sharps — F#, C# (relative of D)',rh:'1-2-3-1-2-3-4-5',lh:'4-3-2-1-4-3-2-1'},
            {root:'F#',sig:'3 sharps — F#, C#, G# (relative of A)',rh:'2-3-1-2-3-1-2-3',lh:'4-3-2-1-3-2-1-4'},
            {root:'C#',sig:'4 sharps — F#, C#, G#, D# (relative of E)',rh:'3-4-1-2-3-1-2-3',lh:'3-2-1-4-3-2-1-3'},
            {root:'G#',sig:'5 sharps — F#, C#, G#, D#, A# (relative of B)',rh:'3-4-1-2-3-1-2-3',lh:'3-2-1-4-3-2-1-3'},
            {root:'D',sig:'1 flat — Bb (relative of F)',rh:'1-2-3-1-2-3-4-5',lh:'5-4-3-2-1-3-2-1'},
            {root:'G',sig:'2 flats — Bb, Eb (relative of Bb)',rh:'1-2-3-1-2-3-4-5',lh:'5-4-3-2-1-3-2-1'},
            {root:'C',sig:'3 flats — Bb, Eb, Ab (relative of Eb)',rh:'1-2-3-1-2-3-4-5',lh:'5-4-3-2-1-3-2-1'},
            {root:'F',sig:'4 flats — Bb, Eb, Ab, Db (relative of Ab)',rh:'1-2-3-4-1-2-3-4',lh:'5-4-3-2-1-3-2-1'},
            {root:'Bb',sig:'5 flats — Bb, Eb, Ab, Db, Gb (relative of Db)',rh:'4-1-2-3-1-2-3-4',lh:'2-1-3-2-1-4-3-2'},
            {root:'Eb',sig:'6 flats (relative of Gb)',rh:'3-1-2-3-4-1-2-3',lh:'2-1-4-3-2-1-3-2'},
          ];

          const ScaleCard=({root,suffix,sig,rh,lh})=>{
            const keyStr=root+(suffix==='m'?'m':'');
            const notes=getScaleNotes(keyStr);
            const label=suffix==='m'?'Minor':'Major';
            const color=suffix==='m'?'var(--ac3)':'var(--ac)';
            return(
              <div className="song-card" style={{cursor:'default'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'0.5rem'}}>
                  <h3 style={{fontSize:'1.3rem',color}}>{root} {label}</h3>
                  <span className="badge" style={{borderColor:color,color,fontSize:'0.65rem'}}>{suffix==='m'?'Minor':'Major'}</span>
                </div>
                <div style={{fontSize:'0.75rem',color:'var(--tx2)',marginBottom:'0.8rem'}}>{sig}</div>
                <div className="scale-notes" style={{marginBottom:'0.8rem'}}>
                  {notes.map((n,i)=><span key={i} className="sn" style={i===0?{background:color,color:'#000',borderColor:color}:{borderColor:color+'33',color}}>{n}</span>)}
                </div>
                <div style={{display:'flex',gap:'1rem',flexWrap:'wrap'}}>
                  <div>
                    <div style={{fontSize:'0.65rem',color:'var(--tx2)',fontWeight:700,marginBottom:'0.15rem'}}>RH FINGERING</div>
                    <div style={{fontFamily:'monospace',fontSize:'0.8rem',letterSpacing:'1px'}}>{rh}</div>
                  </div>
                  <div>
                    <div style={{fontSize:'0.65rem',color:'var(--tx2)',fontWeight:700,marginBottom:'0.15rem'}}>LH FINGERING</div>
                    <div style={{fontFamily:'monospace',fontSize:'0.8rem',letterSpacing:'1px'}}>{lh}</div>
                  </div>
                </div>
              </div>
            );
          };

          return(
            <div>
              <div className="sec-hd"><h2>Major Scales (12)</h2></div>
              <div className="grid grid-3" style={{marginBottom:'2.5rem'}}>
                {majorInfo.map(s=><ScaleCard key={s.root} root={s.root} suffix="" sig={s.sig} rh={s.rh} lh={s.lh}/>)}
              </div>
              <div className="sec-hd"><h2>Natural Minor Scales (12)</h2></div>
              <div className="grid grid-3">
                {minorInfo.map(s=><ScaleCard key={s.root} root={s.root} suffix="m" sig={s.sig} rh={s.rh} lh={s.lh}/>)}
              </div>
            </div>
          );
        })()}

        {/* CHORD PROGRESSIONS */}
        {section==='prog'&&(
          <div>
            <div className="sec-hd"><h2>Chord Progressions to Practice</h2></div>
            <div className="grid grid-3">
              {progressions.map((pg,i)=>(
                <div className="song-card" key={i} style={{cursor:'default'}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'0.3rem'}}>
                    <span className="badge" style={{borderColor:levelColor[pg.level],color:levelColor[pg.level],fontSize:'0.65rem'}}>{pg.level}</span>
                    <span className="badge">{pg.genre}</span>
                  </div>
                  <div className="artist">Key of {pg.key}</div>
                  <h3 style={{fontSize:'1.05rem'}}>{pg.name}</h3>
                  <div className="chords-prev" style={{marginTop:'0.8rem',fontSize:'1rem',fontWeight:700,color:'var(--ac)'}}>
                    {pg.chords.join(' → ')}
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
};

/* ===================================================
   ROOT APP
   =================================================== */
const App=()=>{
  const hash=useHash();
  const metro=useMetronome();
  const[miniOpen,setMiniOpen]=useState(false);
  const pg=hash.split('/')[1]||'';

  let content;
  if(pg==='songs')content=<SongsPage metro={metro}/>;
  else if(pg==='learn')content=<LearnPage/>;
  else if(pg==='practice')content=<PracticePage metro={metro}/>;
  else content=<HomePage/>;

  return(
    <div className="app">
      <Navbar hash={hash}/>
      {content}

      {/* Floating Metronome (available on all pages except Practice) */}
      {pg!=='practice'&&(
        <div className="metro-float">
          <div className={`metro-mini ${miniOpen?'open':''}`}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1rem'}}>
              <h4 style={{fontFamily:'var(--hd)',fontSize:'1rem'}}>Metronome</h4>
              <button onClick={()=>{metro.setPlaying(false);setMiniOpen(false)}} style={{color:'var(--tx2)'}}>{Ico.x}</button>
            </div>
            <MetronomeUI m={metro}/>
          </div>
          <button className="metro-fab" onClick={()=>setMiniOpen(!miniOpen)}>{Ico.metro}</button>
        </div>
      )}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
